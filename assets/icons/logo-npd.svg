<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="95" stroke="#00ffc8" stroke-width="2" opacity="0.2"/>
  <text x="100" y="130" font-size="70" font-weight="bold" text-anchor="middle" fill="none" stroke="#00ffc8" stroke-width="2" filter="url(#glow)" font-family="Arial, sans-serif" letter-spacing="5">NPD</text>
</svg>